server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Baseline security headers for static content.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline'; style-src 'self'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; form-action 'self'; upgrade-insecure-requests" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    # Enable HSTS for HTTPS deployments (ignored over plain HTTP).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Health check endpoint - no logging
    location /health {
        access_log off;
        default_type text/plain;
        return 200 "OK\n";
    }

    # All other requests
    location / {
        try_files $uri $uri/ /index.html;
    }
}
