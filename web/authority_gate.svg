    <line x1="286" y1="166" x2="322" y2="166" stroke-width="1.4"/>
    <path d="M322 160l12 6-12 6z"/>
    <line x1="446" y1="166" x2="478" y2="166" stroke-width="1.4"/>
    <path d="M478 160l12 6-12 6z"/>
    <line x1="602" y1="166" x2="622" y2="166" stroke-width="1.4"/>
    <path d="M622 160l12 6-12 6z"/>
  </g>
  <g font-family="Space Grotesk, Segoe UI, sans-serif" text-anchor="middle">
    <g transform="translate(78 166)">
      <circle r="48" fill="#fff" stroke="#e3dbcf"/>
