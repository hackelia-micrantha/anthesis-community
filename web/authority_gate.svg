<svg viewBox="0 94 760 226" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Anthesis authority gate</title>
  <desc id="desc">Intent, context, policy, approval, execution, and evidence move through a governed authority gate.</desc>
  <g stroke="#1c1b19" fill="#1c1b19" opacity=".45">
    <line x1="126" y1="166" x2="162" y2="166" stroke-width="1.4"/>
