      <text y="3" font-size="11" fill="#4f4a42">repo</text>
      <text y="20" font-size="11" fill="#4f4a42">RFCs</text>
    </g>
    <g transform="translate(390 166)">
      <path d="M0-60l56 32v64L0 68l-56-32v-64z" fill="#f8f2e9" stroke="#e3dbcf"/>
      <text y="-18" font-size="14" font-weight="700" fill="#1c1b19">Policy</text>
      <text y="4" font-size="11" fill="#4f4a42">risk gate</text>
      <text y="22" font-size="11" fill="#4f4a42">allow / deny</text>
    </g>
    <g transform="translate(546 166)">
      <rect x="-56" y="-48" width="112" height="96" rx="16" fill="#fff" stroke="#1b8a7a" stroke-width="1.5"/>
