<svg viewBox="0 84 760 264" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Replay-aware evidence envelope</title>
  <desc id="desc">A governed run records intent, authority, context, approval, activity, validation, outcome, and replay data.</desc>
  <g transform="translate(92 106)" font-family="Space Grotesk, Segoe UI, sans-serif">
    <rect x="0" y="0" width="576" height="178" rx="18" fill="#fff" stroke="#e3dbcf"/>
