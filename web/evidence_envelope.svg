      <circle cx="218" cy="110" r="6"/>
      <circle cx="304" cy="110" r="6"/>
      <circle cx="396" cy="110" r="6"/>
      <circle cx="488" cy="110" r="6"/>
    </g>
    <g stroke="#1c1b19" stroke-width="1" opacity=".22">
      <line x1="89" y1="110" x2="143" y2="110"/>
      <line x1="157" y1="110" x2="211" y2="110"/>
      <line x1="225" y1="110" x2="297" y2="110"/>
      <line x1="311" y1="110" x2="389" y2="110"/>
      <line x1="403" y1="110" x2="481" y2="110"/>
    </g>
  </g>
  <g transform="translate(92 318)" font-family="Space Grotesk, Segoe UI, sans-serif" font-size="12" text-anchor="middle">
