      <text x="138" y="100">actor</text>
      <text x="206" y="100">policy</text>
      <text x="284" y="100">approval</text>
      <text x="378" y="100">context</text>
      <text x="470" y="100">output</text>
    </g>
    <g fill="#1b8a7a">
