    <text x="364" y="4" fill="#1c1b19" font-weight="700">replay</text>
    <rect x="456" y="-18" width="120" height="36" rx="18" fill="#eef7f5" stroke="#1b8a7a"/>
    <text x="516" y="4" fill="#1c1b19" font-weight="700">promotion</text>
