    <rect x="52" y="56" width="472" height="76" rx="12" fill="#fbf6ee" stroke="#e3dbcf"/>
    <g fill="#1c1b19" font-size="12" font-weight="700">
      <text x="28" y="18" text-anchor="start">run record</text>
      <text x="524" y="47" text-anchor="end">governance layer</text>
      <text x="288" y="76" text-anchor="middle">execution layer</text>
    </g>
    <g font-size="12" fill="#4f4a42">
